services:
  - type: web
    name: matchroom-server
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install && pnpm --filter matchroom-server rebuild better-sqlite3 && npx tsc -p server/tsconfig.json
    startCommand: node server/dist/index.js
    envVars:
      - key: TXLINE_API_TOKEN
        sync: false
      - key: NODE_VERSION
        value: 22.14.0
